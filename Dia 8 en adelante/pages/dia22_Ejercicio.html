<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/styles.css" rel="stylesheet">
    <script src="../scripts/dia22_Ejercicio.js" type="module"></script>
    <title>lista-de-contactos</title>
</head>

<body class="bg-[#f4f2f4] flex justify-center pt-10">
    <div id="modal" class="hidden z-100 absolute flex flex-col items-center justify-center h-screen w-screen bg-black/50">
        <div class="relative w-[50%] min-h-[50vh] bg-[#fffdff] rounded-2xl">
            <div class="flex flex-col items-end">
                <button id="cerrar" class="flex justify-center items-center w-8 h-8 bg-red-400 rounded-full">X</button>
            </div>
            <h2>Agregar Contacto</h2>
            <div id="listaDeContactos">
                <label for="nombre">
                    <input id="nombre" name="nombre" type="text" placeholder="Nombre" class="w-full">
                </label>
                <label for="email">
                    <input id="email" name="email" type="email" placeholder="Correo" class="w-full">
                </label>
                <label for="telefono">
                    <input id="telefono" name="telefono" type="number" placeholder="Telefono" class="w-full">
                </label>
            </div>

            <button id="agregar" class="bg-[#037afc] py-2 rounded-lg hover:bg-[#037afc]/50 ">
                Agregar
            </button>
        </div>
    </div>
    <main class="flex flex-col justify-center items-center h-screen w-screen">
        <div id="lista-de-contactos" class="flex flex-col bg-[#fffdff] shadow p-24 rounded-xl w-[60%] h-[55%]">
            <div class="flex justify-between p-4">
                <h1 class="text-2xl">Lista de Contactos</h1>
                <button id="mas"
                    class="h-12 w-12 text-4xl flex items-center justify-center rounded-full leading-none bg-[#037afc]">
                    <span class="-translate-y-0.5 text-[#fffdff]">+</span>
                </button>
            </div>
            <div id="info"> <!--Aca se agregan datos de local storage-->
                
            </div>
        </div>
    </main>
</body>

</html>
